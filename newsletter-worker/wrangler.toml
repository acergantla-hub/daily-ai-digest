name = "daily-ai-digest-newsletter"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace binding — create this with `wrangler kv:namespace create SUBSCRIBERS`
# then put the returned ID below
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "YOUR_KV_NAMESPACE_ID"

# Optional: SendGrid for email notifications on new subscriber
# [vars]
# NOTIFY_EMAIL = "you@example.com"
# ADMIN_API_KEY = "your-secret-admin-key"

# SendGrid API key as a secret (set with `wrangler secret put SENDGRID_API_KEY`)
